project:
  type: website
  output-dir: _site
  resources:
    - CNAME
    - image2.png
  render:
    - "*.qmd"
    - "!/assets/*.*"
    - "!/notebooks/*.*"
    - "!/forthcoming/*.*"
    - "!.ipynb_checkpoints/"  # exclude ipynb checkpoints
    - "!*/.ipynb_checkpoints/" # exclude in subdirectories
    - "!.DS_Store"
    - "!*/.DS_Store"

site:
  title: ""
  site-url: https://blog.kerryback.com
  feed:
    type: rss2
  description: "Teaching the use of generative AI in finance"

        
  page-footer:
    center: "&copy; Copyright 2025, Kerry Back"

format:
  html:
    code-overflow: wrap
    theme:
      light: flatly
      dark: superhero
    css: styles.css
    toc: true
    theme-dark: superhero
    theme-light: flatly
    include-after-body: |
      <script>
      (function() {
        // Apply saved theme on page load
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-bs-theme', savedTheme);
        
        // Listen for theme changes from other pages
        window.addEventListener('storage', function(e) {
          if (e.key === 'theme') {
            document.documentElement.setAttribute('data-bs-theme', e.newValue);
          }
        });
      })();
      </script>

execute:
  freeze: auto

comments:
  giscus:
    repo: kerryback/blog
    repo-id: R_kgDOOkPrbQ
    category: General
    category-id: DIC_kwDOOkPrbc4Cpylb
    mapping: pathname
    reactions-enabled: true
    loading: lazy
    input-position: bottom
    theme: preferred_color_scheme 




 